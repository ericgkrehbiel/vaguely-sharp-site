<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaguely Sharp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background-color: #0F0F11;
      font-family: 'Saira', -apple-system, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .logo {
      max-width: 600px;
      width: 65vw;
      height: auto;
      display: block;
    }

    .tagline {
      color: #FFFFFF;
      font-size: clamp(1.39rem, 4.74vw, 2.37rem);
      text-align: center;
      line-height: 1.35;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      src="Logo/Logo High Res/Cropped-High/Logo-w-crop-high.png"
      alt="Vaguely Sharp logo"
      class="logo"
      onerror="this.onerror=null; this.src='Logo/Logo Low Res/Cropped-Low/Logo-w-crop-low.png';"
    />
    <p class="tagline">
      Make It Matter.
    </p>
  </div>
</body>
</html>
